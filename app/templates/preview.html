<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>预览 · 一图读懂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f8f9fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #202124;
  }
  .topbar {
    width: 100%;
    background: linear-gradient(135deg, #1a73e8, #1967d2);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-title {
    color: #fff;
    font-size: 20px;
    font-weight: 600;
  }
  .topbar-actions { display: flex; gap: 12px; }
  .btn {
    padding: 8px 24px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    text-decoration: none;
    display: inline-block;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #fff; color: #1a73e8; }
  .btn-secondary { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.4); }
  .container {
    max-width: 720px;
    width: 100%;
    padding: 40px 24px;
    text-align: center;
  }
  .doc-title {
    font-size: 24px;
    color: #202124;
    margin-bottom: 32px;
    font-weight: 600;
  }
  .preview-wrapper {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .preview-img {
    width: 100%;
    height: auto;
    display: block;
  }
  .action-bar {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-download {
    background: linear-gradient(135deg, #1a73e8, #1967d2);
    color: #fff;
    padding: 14px 40px;
    font-size: 16px;
  }
  .btn-new {
    background: #fff;
    color: #1a73e8;
    border: 2px solid #1a73e8;
    padding: 12px 32px;
    font-size: 16px;
  }
  .success-msg {
    background: #e6f4ea;
    color: #137333;
    padding: 12px 24px;
    border-radius: 8px;
    margin-bottom: 24px;
    font-size: 16px;
  }
  .footer { margin-top: 40px; color: #9aa0a6; font-size: 14px; }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">📊 一图读懂 · 预览</span>
  <div class="topbar-actions">
    <a href="/download/{{ img_filename }}" class="btn btn-primary">💾 下载图片</a>
    <a href="/" class="btn btn-secondary">+ 新建</a>
  </div>
</div>

<div class="container">
  {% if title %}
  <h2 class="doc-title">{{ title }}</h2>
  {% endif %}

  <div class="success-msg">✅ 长图已生成，可直接发微信群/朋友圈</div>

  <div class="preview-wrapper">
    <img src="/preview/{{ img_filename }}" class="preview-img" alt="预览图">
  </div>

  <div class="action-bar">
    <a href="/download/{{ img_filename }}" class="btn btn-download">💾 下载高清图片</a>
    <a href="/" class="btn btn-new">+ 上传新文件</a>
  </div>

  <div class="footer">
    一图读懂 · yitududong v1.0 · 自动生成
  </div>
</div>
</body>
</html>
