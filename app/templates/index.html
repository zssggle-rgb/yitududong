<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>一图读懂 · yitududong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #e8f0fe 0%, #ffffff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #202124;
  }
  .container {
    max-width: 640px;
    width: 100%;
    padding: 60px 24px;
    text-align: center;
  }
  .logo {
    font-size: 48px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 32px;
    color: #1a73e8;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 18px;
    color: #5f6368;
    margin-bottom: 48px;
    line-height: 1.6;
  }
  .upload-area {
    background: #ffffff;
    border: 3px dashed #dadce0;
    border-radius: 16px;
    padding: 60px 40px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 32px;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: #1a73e8;
    background: #e8f0fe;
  }
  .upload-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  .upload-text {
    font-size: 20px;
    color: #5f6368;
    margin-bottom: 8px;
  }
  .upload-hint {
    font-size: 14px;
    color: #9aa0a6;
  }
  .upload-form {
    display: none;
  }
  .submit-btn {
    display: inline-block;
    background: linear-gradient(135deg, #1a73e8, #1967d2);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    padding: 16px 48px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
    width: 100%;
  }
  .submit-btn:hover { opacity: 0.9; }
  .feature-list {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 48px;
  }
  .feature-item {
    background: #ffffff;
    padding: 12px 20px;
    border-radius: 20px;
    font-size: 14px;
    color: #1967d2;
    border: 1px solid #dadce0;
  }
  .footer {
    margin-top: 60px;
    color: #9aa0a6;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">📊</div>
  <h1>一图读懂</h1>
  <p class="subtitle">
    上传政策/公告 PDF，自动生成适合微信传播的<br>结构化长图
  </p>

  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📄</div>
    <div class="upload-text">点击上传文件，或拖拽文件到此处</div>
    <div class="upload-hint">支持 PDF、Word 文档</div>
  </div>

  <form action="/upload" method="post" enctype="multipart/form-data" id="uploadForm">
    <input type="file" name="file" id="fileInput" accept=".pdf,.docx,.doc" style="display:none" onchange="this.form.submit()">
  </form>

  <div class="feature-list">
    <span class="feature-item">🔍 智能解析</span>
    <span class="feature-item">🎨 蓝色卡片风格</span>
    <span class="feature-item">📱 微信适配</span>
    <span class="feature-item">⚡ 即时生成</span>
  </div>

  <div class="footer">
    一图读懂 · yitududong v1.0
  </div>
</div>

<script>
  const uploadArea = document.getElementById('uploadArea');
  ['dragenter','dragover'].forEach(event => {
    uploadArea.addEventListener(event, e => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
  });
  ['dragleave','drop'].forEach(event => {
    uploadArea.addEventListener(event, e => {
      uploadArea.classList.remove('dragover');
    });
  });
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      const input = document.getElementById('fileInput');
      const dt = new DataTransfer();
      dt.items.add(files[0]);
      input.files = dt.files;
      document.getElementById('uploadForm').submit();
    }
  });
</script>
</body>
</html>
