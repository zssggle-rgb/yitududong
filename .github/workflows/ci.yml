name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Project checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python checks
        shell: bash
        run: |
          if python - <<'PY'
          from pathlib import Path
          paths = [p for p in Path('.').rglob('*.py') if '.git' not in p.parts]
          raise SystemExit(0 if paths else 1)
          PY
          then
            python -m pip install --upgrade pip
            if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
            if [ -f pyproject.toml ]; then python -m pip install -e .; fi
            python -m pip install pytest
            if python - <<'PY'
          from pathlib import Path
          tests = [
              p for p in Path('.').rglob('*.py')
              if '.git' not in p.parts and (p.name.startswith('test_') or 'tests' in p.parts)
          ]
          raise SystemExit(0 if tests else 1)
          PY
            then
              python -m pytest -q
            else
              python -m compileall .
            fi
          else
            echo "No Python files detected."
          fi

      - name: Set up Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Node checks
        if: hashFiles('package.json') != ''
        shell: bash
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm test --if-present
          npm run build --if-present
